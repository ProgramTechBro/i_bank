name: i_bank
description: "iBank - Premium Bank & Wallet App for Fintech / Digital Banking."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  injectable: ^2.4.4
  get_it: ^7.7.0
  dio: ^5.5.0
  pretty_dio_logger: ^1.3.1
  connectivity_plus: ^6.0.5
  go_router: ^14.2.0
  dartz: ^0.10.1
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.2
  cached_network_image: ^3.4.0
  intl: ^0.19.0
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  flutter_svg:
  country_flags: ^3.1.0
  fl_chart: ^0.69.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0
  injectable_generator: ^2.6.1
  freezed: ^2.5.7
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
